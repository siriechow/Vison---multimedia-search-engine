version: '3.8'

services:
  backend:
    build: ./backend
    container_name: vison-backend
    ports:
      - "8000:8000"
    volumes:
      - vison-data:/app/data
    environment:
      - DEBUG=false
      - USE_OPENVINO=true
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/api/health" ]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build: ./frontend
    container_name: vison-frontend
    ports:
      - "3000:3000"
    environment:
      - BACKEND_URL=http://backend:8000
      - PORT=3000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  vison-data:
    driver: local
